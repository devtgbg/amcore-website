<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Product Range | AmpCore Energy</title>
    <meta
      name="description"
      content="Explore the AmpCore Energy battery range across 51.2V and 76.8V platforms with full product specification pages."
    />
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <script defer src="../assets/js/data.js"></script>
    <script defer src="../assets/js/app.js"></script>
  </head>
  <body data-page="products">
    <header class="site-header" data-site-header></header>
    <main class="page-shell">
      <section class="hero page-title">
        <div class="shell-container hero-grid">
          <div class="hero-copy reveal">
            <p class="eyebrow">Product Range</p>
            <h1>Battery systems for different driving needs.</h1>
            <p class="hero-lead">
              Whether you want a compact everyday battery, more runtime between charges, or maximum capacity for heavier use, the AmpCore range gives you clear options.
            </p>
          </div>
          <div class="hero-visual hero-visual-panel reveal delay-2">
            <img src="../assets/images/product-51-210-render.jpg" alt="AmpCore high-capacity battery" />
          </div>
        </div>
      </section>

      <section class="section">
        <div class="shell-container">
          <div class="range-grid" data-products-grid></div>
        </div>
      </section>

      <section class="section section-soft">
        <div class="shell-container">
          <div class="section-head">
            <div>
              <p class="eyebrow">Comparison</p>
              <h2>Compare the essentials quickly.</h2>
            </div>
          </div>
          <div class="comparison-wrap reveal-card" data-comparison-table></div>
        </div>
      </section>
    </main>
    <footer class="site-footer" data-site-footer></footer>
  </body>
</html>
